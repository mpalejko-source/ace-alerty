            margin: 0;
        }
        .container {
            max-width: 600px;

    <!-- Skrypt OneSignal -->

      OneSignalDeferred.push(function(OneSignal) {
        OneSignal.init({
          appId: "133815a4-f1fa-44d8-98b5-60c54f435d56", 
          notifyButton: {
            enable: true,
          },
        });
      });
    </script>
</head>
<body>
    <div class="container">
        <h1>ACE Group Alerty</h1>
        <p>Błyskawiczne powiadomienia rynkowe. Otrzymuj kluczowe sygnały, krótkie analizy i wykresy bezpośrednio na ekran swojego telefonu.</p>
